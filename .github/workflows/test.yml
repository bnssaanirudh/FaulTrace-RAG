name: FaultTrace RAG CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/core
          pip install -e packages/data
          pip install -e packages/gold
          pip install -e packages/pipelines
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-cov httpx duckdb

      - name: Run Python tests
        run: |
          pytest apps/api/tests/ -v --cov=packages --cov=apps/api

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Typecheck web app
        working-directory: apps/web
        run: npx tsc --noEmit
