[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "faulttrace-reporting"
version = "0.1.0"
description = "Reporting utilities for FaultTrace-RAG"
requires-python = ">=3.11"
dependencies = [
    "faulttrace-core",
    "orjson>=3.10.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["faulttrace_reporting*"]
