[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "faulttrace-core"
version = "0.1.0"
description = "Core domain contracts for FaultTrace-RAG"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7.0",
    "orjson>=3.10.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["faulttrace_core*"]
