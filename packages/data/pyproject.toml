[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "faulttrace-data"
version = "0.1.0"
description = "Deterministic corpus generator for FaultTrace-RAG"
requires-python = ">=3.11"
dependencies = [
    "faulttrace-core",
    "pandas>=2.2.0",
    "pyarrow>=16.0.0",
    "orjson>=3.10.0",
    "typer>=0.12.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["faulttrace_data*"]

[project.scripts]
faulttrace = "faulttrace_data.cli:app"
