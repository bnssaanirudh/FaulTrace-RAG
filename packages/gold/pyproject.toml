[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "faulttrace-gold"
version = "0.1.0"
description = "Dual gold engine (Pandas + DuckDB) for FaultTrace-RAG"
requires-python = ">=3.11"
dependencies = [
    "faulttrace-core",
    "pandas>=2.2.0",
    "duckdb>=1.0.0",
    "pyarrow>=16.0.0",
    "orjson>=3.10.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["faulttrace_gold*"]
